<!DOCTYPE html>
<html>

<head>
    <title>Random Quotes Generator</title>
    <meta charset="UTF-8">
    <!-- Normalize CSS -->
    <link rel="stylesheet" href="css/normalize.css">
    <!-- Set CSS Files -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/all.min.css">
    <!--Set Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Changa+One&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap">
</head>

<body>
    <h1 id="page-title" class="page-title">Random Quotes Generator</h1>
    <div id="quotes" class="quotes">
        <div id="quotes-container" class="container">
            <div id="quote-box" class="quote-box">
                <span>1</span>
                <i class="fa-solid fa-quote-left"></i>
                <i class="fa-solid fa-quote-right"></i>
                <p id="quote-txt" class="quote-txt">Quote</p>
            </div>
            <div id="buttons-box" class="buttons-box">
                <button id="button-1" class="button-1">generate quote</button>
                <button id="button-2" class="button-2">auto generate</button>
                <button id="button-3" class="button-3">stop generate</button>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>

</html>
